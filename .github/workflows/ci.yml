name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin ruff version to match .pre-commit-config.yaml (v0.9.6)
      - name: Install linters
        run: pip install "ruff==0.9.6" codespell

      - name: Ruff check
        run: ruff check skills/ scripts/

      - name: Ruff format check
        run: ruff format --check skills/ scripts/

      # Use pyproject.toml config for skip/ignore-words-list
      - name: Codespell
        run: codespell --toml pyproject.toml skills/ scripts/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Run each skill's tests in isolation to avoid module name collisions
      # (each skill has its own scorer.py, calculators/, helpers.py).
      # Order: alphabetical by skill name.
      - name: Test backtest-expert
        run: >
          python -m pytest skills/backtest-expert/scripts/tests/ -v
          --cov=skills/backtest-expert/scripts
          --cov-report=term-missing

      - name: Test data-quality-checker
        run: >
          python -m pytest skills/data-quality-checker/scripts/tests/ -v
          --cov=skills/data-quality-checker/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test dual-axis-skill-reviewer
        run: >
          python -m pytest skills/dual-axis-skill-reviewer/scripts/tests/ -v
          --cov=skills/dual-axis-skill-reviewer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test ftd-detector
        run: >
          python -m pytest skills/ftd-detector/scripts/tests/ -v
          --cov=skills/ftd-detector/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test institutional-flow-tracker
        run: >
          python -m pytest skills/institutional-flow-tracker/scripts/tests/ -v
          --cov=skills/institutional-flow-tracker/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test macro-regime-detector
        run: >
          python -m pytest skills/macro-regime-detector/scripts/tests/ -v
          --cov=skills/macro-regime-detector/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test market-breadth-analyzer
        run: >
          python -m pytest skills/market-breadth-analyzer/scripts/tests/ -v
          --cov=skills/market-breadth-analyzer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test market-top-detector
        run: >
          python -m pytest skills/market-top-detector/scripts/tests/ -v
          --cov=skills/market-top-detector/scripts
          --cov-report=term-missing
          --cov-append

      - name: Install canslim-screener FMP test deps
        run: pip install beautifulsoup4 lxml

      - name: Test canslim-screener FMP client contracts
        run: >
          python -m pytest
          skills/canslim-screener/scripts/tests/test_fmp_fallback.py
          skills/canslim-screener/scripts/tests/test_fmp_stable_migration.py
          skills/canslim-screener/scripts/tests/test_institutional_fallback.py
          -v
          --cov=skills/canslim-screener/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test parabolic-short-trade-planner
        run: >
          python -m pytest skills/parabolic-short-trade-planner/scripts/tests/ -v
          --cov=skills/parabolic-short-trade-planner/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test sector-analyst
        run: >
          python -m pytest skills/sector-analyst/scripts/tests/ -v
          --cov=skills/sector-analyst/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test stanley-druckenmiller-investment
        run: >
          python -m pytest skills/stanley-druckenmiller-investment/scripts/tests/ -v
          --cov=skills/stanley-druckenmiller-investment/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test stockbee-20pct-study
        run: >
          python -m pytest skills/stockbee-20pct-study/scripts/tests/ -v
          --cov=skills/stockbee-20pct-study/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test stockbee-exhaustion-hammer-screener
        run: >
          python -m pytest skills/stockbee-exhaustion-hammer-screener/scripts/tests/ -v
          --cov=skills/stockbee-exhaustion-hammer-screener/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test stockbee-momentum-burst-screener
        run: >
          python -m pytest skills/stockbee-momentum-burst-screener/scripts/tests/ -v
          --cov=skills/stockbee-momentum-burst-screener/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test stockbee-episodic-pivot-analyzer
        run: >
          python -m pytest skills/stockbee-episodic-pivot-analyzer/scripts/tests/ -v
          --cov=skills/stockbee-episodic-pivot-analyzer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test stockbee-setup-fluency-trainer
        run: >
          python -m pytest skills/stockbee-setup-fluency-trainer/scripts/tests/ -v
          --cov=skills/stockbee-setup-fluency-trainer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test uptrend-analyzer
        run: >
          python -m pytest skills/uptrend-analyzer/scripts/tests/ -v
          --cov=skills/uptrend-analyzer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test vcp-screener
        run: >
          python -m pytest skills/vcp-screener/scripts/tests/ -v
          --cov=skills/vcp-screener/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test position-sizer
        run: >
          python -m pytest skills/position-sizer/scripts/tests/ -v
          --cov=skills/position-sizer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test edge-strategy-reviewer
        run: >
          python -m pytest skills/edge-strategy-reviewer/scripts/tests/ -v
          --cov=skills/edge-strategy-reviewer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test edge-pipeline-orchestrator
        run: >
          python -m pytest skills/edge-pipeline-orchestrator/scripts/tests/ -v
          --cov=skills/edge-pipeline-orchestrator/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test skill-designer
        run: >
          python -m pytest skills/skill-designer/scripts/tests/ -v
          --cov=skills/skill-designer/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test skill-idea-miner
        run: >
          python -m pytest skills/skill-idea-miner/scripts/tests/ -v
          --cov=skills/skill-idea-miner/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test trading-skills-navigator
        run: >
          python -m pytest skills/trading-skills-navigator/scripts/tests/ -v
          --cov=skills/trading-skills-navigator/scripts
          --cov-report=term-missing
          --cov-append

      - name: Test repo-level scripts
        run: >
          python -m pytest scripts/tests/ -v
          --cov=scripts
          --cov-report=term-missing
          --cov-append

      # Known failures: theme-detector (27 pre-existing), canslim-screener (requires bs4).
      # Run with continue-on-error so they don't block the pipeline.
      - name: Install theme-detector extra deps
        run: pip install pandas numpy

      - name: Test theme-detector (known failures)
        continue-on-error: true
        run: >
          python -m pytest skills/theme-detector/scripts/tests/ -v
          --cov=skills/theme-detector/scripts
          --cov-report=term-missing
          --cov-append

      - name: Coverage summary
        if: always()
        run: python -m coverage report

      - name: Upload coverage report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  metadata:
    name: Metadata + Workflow checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: pip install pyyaml

      # 1. Validate skills-index.yaml structure + bijection with skills/.
      # Default mode is what pre-commit runs on each commit.
      - name: Validate skills-index (default)
        run: python3 scripts/validate_skills_index.py

      # 2. Strict workflow validation — workflow files exist, schema rules
      # pass (artifact parity, required_skills coverage, decision-gate
      # questions, no deprecated skills in required_skills, etc.).
      # This is what pre-push enforces locally.
      - name: Validate skills-index (--strict-workflows)
        run: python3 scripts/validate_skills_index.py --strict-workflows

      # 2b. Strict metadata validation — every skill has populated
      # timeframe / difficulty / inputs / outputs (no `unknown` markers,
      # no empty lists). Now safe to enforce because the corresponding
      # fill-in PR populated these fields for all 54 skills.
      - name: Validate skills-index (--strict-metadata)
        run: python3 scripts/validate_skills_index.py --strict-metadata

      # 2c. Skillset manifest validation — full-field completeness +
      # related_workflows coherence (SK001-SK013). Always strict.
      - name: Validate skillsets
        run: python3 scripts/validate_skillsets.py

      # 3b. Drift check: docs/{en,ja}/skillsets.md must match what the
      # generator would produce from skillsets/*.yaml. Catches manual edits
      # to the docs and stale docs after manifest changes.
      - name: Skillset docs drift check
        run: python3 scripts/generate_skillset_docs.py --check

      # 3a. Skill docs drift check: generator-owned pages (frontmatter
      # `generated: true`) must match generator output, and every skill must
      # have EN+JA pages. Hand-maintained pages (generated:false/absent or
      # HAND_WRITTEN) are existence/marker-checked only — never content-
      # compared, never reverted.
      - name: Skill docs drift check
        run: python3 scripts/generate_skill_docs.py --check

      # 3. Drift check: docs/{en,ja}/workflows.md must match what the
      # generator would produce from workflows/*.yaml. Catches manual edits
      # to the docs and stale docs after manifest changes.
      - name: Workflow docs drift check
        run: python3 scripts/generate_workflow_docs.py --check

      # 4. README catalog drift check: the catalog sections in README.md and
      # README.ja.md (between skills-index sentinel markers) must match what
      # the generator would produce from skills-index.yaml.
      - name: README catalog drift check
        run: python3 scripts/generate_catalog_from_index.py --check

      # 5. Navigator snapshot drift check: the bundled
      # skills/trading-skills-navigator/assets/metadata_snapshot.json (the
      # Claude Web App fallback) must match what build_snapshot.py would
      # produce from skills-index.yaml + workflows/*.yaml.
      - name: Navigator snapshot drift check
        run: python3 skills/trading-skills-navigator/scripts/build_snapshot.py --check

      - name: FMP client drift check
        run: python3 scripts/generate_fmp_client.py --check

      - name: Changed skill package drift check
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [[ "$BASE" =~ ^0+$ ]]; then
              BASE="${HEAD}^"
            fi
          fi
          mapfile -t changed < <(git diff --name-only "$BASE...$HEAD")
          python3 scripts/check_package_drift_for_changed_skills.py "${changed[@]}"

      - name: FMP skill package drift check
        run: python3 scripts/package_skills.py --check --skill pead-screener --skill earnings-trade-analyzer --skill ibd-distribution-day-monitor --skill vcp-screener --skill parabolic-short-trade-planner --skill ftd-detector --skill canslim-screener --skill macro-regime-detector --skill market-top-detector

      # Note: the validator + generator unit tests already run under the
      # 'Test repo-level scripts' step in the test job above.

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install security tools
        run: pip install "bandit[toml]>=1.9.0" "detect-secrets>=1.5.0"

      - name: Bandit SAST scan
        run: bandit -c pyproject.toml -r skills/ --exclude "*/tests/*"

      # Compare a fresh scan against committed baseline (results only, ignore metadata)
      - name: Detect secrets check
        run: |
          detect-secrets scan \
            --exclude-files '\.env$|\.json$|\.csv$|\.md$|\.zip$|\.baseline$' \
            > /tmp/new_scan.json
          python3 -c "
          import json, sys
          with open('.secrets.baseline') as f: old = json.load(f)
          with open('/tmp/new_scan.json') as f: new = json.load(f)
          old_set = {(p, i['hashed_secret'], i['line_number'])
                     for p, items in old.get('results', {}).items() for i in items}
          new_set = {(p, i['hashed_secret'], i['line_number'])
                     for p, items in new.get('results', {}).items() for i in items}
          diff = new_set - old_set
          if diff:
              print(f'ERROR: {len(diff)} new secret(s) not in baseline:')
              for p, h, ln in sorted(diff):
                  print(f'  {p}:{ln}')
              sys.exit(1)
          print(f'OK: {len(new_set)} known, 0 new')
          "
