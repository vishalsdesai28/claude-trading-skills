schema_version: 1
id: swing-opportunity
display_name: Swing Opportunity
category: swing-opportunity
timeframe: daily
difficulty: intermediate
api_profile: fmp-required
target_users:
  - part-time-swing-trader

when_to_use: >-
  The satellite swing sleeve: generate and validate swing-trade candidates and
  build risk-sized entry plans. Use only on days the market-regime sleeve has
  allowed new risk. Operationalized by the swing-opportunity-daily workflow
  (prerequisite: market-regime-daily exposure decision).
when_not_to_use: >-
  Do not run when the latest market-regime exposure decision is cash-priority
  or restrictive. Do not use the screeners standalone without the regime gate
  and position sizing.

required_skills:
  - vcp-screener
  - technical-analyst
  - position-sizer
  - trader-memory-core
recommended_skills:
  - canslim-screener
  - breakout-trade-planner
  - theme-detector
optional_skills:
  - stockbee-momentum-burst-screener
  - stockbee-exhaustion-hammer-screener
  - finviz-screener

related_workflows:
  - swing-opportunity-daily
