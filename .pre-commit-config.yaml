# Install both pre-commit and pre-push hooks:
#   pre-commit install && pre-commit install --hook-type pre-push
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [--skip, ".venv,*.json,*.csv,*.baseline,skill-packages,*.pyc,__pycache__",
               --ignore-words-list, "trough,ore,cna,acn,blok,hims,pont,claus,theses"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: '\.env$|\.json$|\.csv$|\.md$|\.zip$'

  # Project-specific pre-commit checks
  - repo: local
    hooks:
      - id: no-absolute-paths
        name: Detect absolute paths with usernames
        entry: python3 scripts/hooks/check_no_absolute_paths.py
        language: system
        types: [text]
        exclude: '\.git/|\.venv/|\.secrets\.baseline$|/tests?/|CLAUDE\.md$|check_no_absolute_paths\.py$'

      - id: skill-frontmatter
        name: Validate SKILL.md frontmatter
        entry: python3 scripts/hooks/check_skill_frontmatter.py
        language: system
        files: 'skills/.*/SKILL\.md$'

      - id: docs-completeness
        name: Check all skills have doc pages
        entry: python3 scripts/hooks/check_docs_completeness.py
        language: system
        files: 'skills/.*/SKILL\.md$|docs/.*/skills/.*\.md$'
        pass_filenames: false

      - id: validate-skills-index
        name: Validate skills-index.yaml against skills/ folder
        entry: python3 scripts/validate_skills_index.py
        language: system
        # Re-run whenever any of the SSoT inputs OR the validator/spec change.
        # pass_filenames: false → hook always validates the entire repo.
        files: '^(skills-index\.yaml|skills/[^/]+/SKILL\.md|workflows/.*\.yaml|scripts/validate_skills_index\.py|scripts/tests/test_validate_skills_index\.py|docs/dev/metadata-and-workflow-schema\.md)$'
        pass_filenames: false

      - id: validate-skillsets
        name: Validate skillsets/*.yaml manifests (SK001-SK013)
        entry: python3 scripts/validate_skillsets.py
        language: system
        # Inputs: the manifests, plus skills-index.yaml + workflows/*.yaml
        # (skill/workflow refs and the related_workflows coherence rules are
        # validated against them — a workflow edit that desyncs a skillset
        # must fail here). pass_filenames: false → always validate all manifests.
        files: '^(skillsets/.*\.yaml|skills-index\.yaml|workflows/.*\.yaml|scripts/validate_skillsets\.py|scripts/tests/test_validate_skillsets\.py|docs/dev/metadata-and-workflow-schema\.md)$'
        pass_filenames: false

      - id: workflow-docs-drift
        name: Workflow docs drift check (regenerate from workflows/*.yaml)
        entry: python3 scripts/generate_workflow_docs.py --check
        language: system
        # Fire on any input that affects rendered output: manifests, generator,
        # and the rendered docs themselves (so manual edits are caught).
        files: '^(workflows/.*\.yaml|scripts/generate_workflow_docs\.py|docs/(en|ja)/workflows\.md)$'
        pass_filenames: false

      - id: skillset-docs-drift
        name: Skillset docs drift check (regenerate from skillsets/*.yaml)
        entry: python3 scripts/generate_skillset_docs.py --check
        language: system
        # Fire on any input that affects rendered output: manifests, generator,
        # and the rendered docs themselves (so manual edits are caught).
        files: '^(skillsets/.*\.yaml|scripts/generate_skillset_docs\.py|docs/(en|ja)/skillsets\.md)$'
        pass_filenames: false

      - id: skill-docs-drift
        name: Skill docs drift check (generator-owned pages only)
        entry: python3 scripts/generate_skill_docs.py --check
        language: system
        # Content-compares ONLY generator-owned pages (frontmatter
        # `generated: true`); hand-maintained pages (generated:false/absent
        # or HAND_WRITTEN) are existence/marker-checked only, never reverted.
        # Fire on every generator input: SKILL.md, references/scripts (resource
        # list), CLAUDE.md (API/CLI parse), skill-packages/*.skill (download
        # button), the generator, and the rendered docs themselves.
        files: '^(skills/[^/]+/SKILL\.md|skills/[^/]+/references/.*|skills/[^/]+/scripts/.*\.py|scripts/generate_skill_docs\.py|CLAUDE\.md|skill-packages/.*\.skill|docs/(en|ja)/skills/[^/]+\.md)$'
        pass_filenames: false

      - id: catalog-drift
        name: README + CLAUDE.md catalog drift check (regenerate from skills-index.yaml)
        entry: python3 scripts/generate_catalog_from_index.py --check
        language: system
        # Fire on any input that affects rendered output: index, generator,
        # and the target files themselves (catches manual edits between
        # sentinel markers).
        files: '^(skills-index\.yaml|scripts/generate_catalog_from_index\.py|README\.md|README\.ja\.md|CLAUDE\.md)$'
        pass_filenames: false

      - id: snapshot-check
        name: Navigator metadata snapshot drift check (regenerate from SSoT)
        entry: python3 skills/trading-skills-navigator/scripts/build_snapshot.py --check
        language: system
        # Fire on any SSoT input, the normalizer/builder, OR the bundled
        # snapshot itself (catches manual edits + stale Web-App fallback).
        # recommend.py is included because build_snapshot.py imports its
        # normalize_* functions — a normalization change must regen the snapshot.
        # skillsets/*.yaml is included because PR-N2 load_ssot folds skillsets
        # into the snapshot — a manifest edit must regen it.
        files: '^(skills-index\.yaml|workflows/.*\.yaml|skillsets/.*\.yaml|skills/trading-skills-navigator/(assets/metadata_snapshot\.json|scripts/(build_snapshot|recommend)\.py))$'
        pass_filenames: false

      - id: fmp-client-drift
        name: FMP client drift check (regenerate vendored fmp_client.py from canonical source)
        entry: python3 scripts/generate_fmp_client.py --check
        language: system
        # Fire on the canonical source, the generator, and every vendored copy
        # (catches a manual edit to a generated fmp_client.py / _fmp_compat.py).
        files: '^(scripts/fmp_client/.*|scripts/generate_fmp_client\.py|skills/(pead-screener|earnings-trade-analyzer|ibd-distribution-day-monitor|vcp-screener|parabolic-short-trade-planner|ftd-detector)/scripts/(fmp_client|_fmp_compat)\.py)$'
        pass_filenames: false

      - id: fmp-package-drift
        name: FMP skill package drift check (re-package after vendored client changes)
        entry: python3 scripts/package_skills.py --check --skill pead-screener --skill earnings-trade-analyzer --skill ibd-distribution-day-monitor --skill vcp-screener --skill parabolic-short-trade-planner --skill ftd-detector
        language: system
        # The fmp-client-drift gate validates source; this validates the .skill
        # bundles so an edited client that was not re-packaged is caught.
        files: '^(skills/(pead-screener|earnings-trade-analyzer|ibd-distribution-day-monitor|vcp-screener|parabolic-short-trade-planner|ftd-detector)/.*|skill-packages/(pead-screener|earnings-trade-analyzer|ibd-distribution-day-monitor|vcp-screener|parabolic-short-trade-planner|ftd-detector)\.skill)$'
        pass_filenames: false

      # Pre-push hook: run validator in --strict-workflows + --strict-metadata
      # mode. Pre-commit stays in default mode so quick edits aren't blocked,
      # but pushes must satisfy the stricter contract (workflow internal
      # consistency + populated metadata fields).
      - id: validate-skills-index-strict
        name: Validate skills-index.yaml + workflows + metadata (strict)
        entry: python3 scripts/validate_skills_index.py --strict-workflows --strict-metadata
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      # Pre-push hook: run all skill-level tests before pushing
      # Tests run per-skill to avoid module name collisions (scorer.py, helpers.py, etc.)
      - id: pytest-pre-push
        name: Run all skill tests
        entry: bash scripts/run_all_tests.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
